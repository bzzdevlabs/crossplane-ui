{{- $component := "gateway" -}}
{{- $selector := (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crossplane-ui.fullname" . }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "crossplane-ui.selectorLabels" $selector | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crossplane-ui.selectorLabels" $selector | nindent 8 }}
      annotations:
        {{- with .Values.gateway.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "crossplane-ui.serviceAccountName" $selector }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.gateway.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "crossplane-ui.image" (dict "ctx" . "service" .Values.gateway.image) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: LOG_LEVEL
              value: {{ .Values.gateway.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.gateway.logFormat | quote }}
            - name: AUTH_SERVICE_URL
              value: "http://{{ include "crossplane-ui.fullname" . }}-auth.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.auth.service.port }}"
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerURL | default (printf "http://%s-dex.%s.svc.cluster.local:5556" .Release.Name .Release.Namespace) | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientID | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "crossplane-ui.fullname" . }}-oidc
                  key: clientSecret
            {{- with .Values.gateway.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.gateway.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
