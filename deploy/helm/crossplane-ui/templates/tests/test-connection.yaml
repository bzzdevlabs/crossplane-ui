apiVersion: v1
kind: Pod
metadata:
  name: {{ include "crossplane-ui.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      command:
        - sh
        - -c
        - |
          set -e
          curl -fsS http://{{ include "crossplane-ui.fullname" . }}-gateway:{{ .Values.gateway.service.port }}/healthz
          curl -fsS http://{{ include "crossplane-ui.fullname" . }}-auth:{{ .Values.auth.service.port }}/healthz
