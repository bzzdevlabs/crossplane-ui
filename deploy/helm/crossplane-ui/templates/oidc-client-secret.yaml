{{- $secretName := printf "%s-oidc" (include "crossplane-ui.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $clientSecret := .Values.oidc.clientSecret -}}
{{- if and (not $clientSecret) $existing }}
  {{- $clientSecret = index $existing.data "clientSecret" | b64dec -}}
{{- end }}
{{- if not $clientSecret }}
  {{- $clientSecret = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: oidc
  annotations:
    # The auth service + gateway both consume this Secret; the OAuth2Client
    # Dex CR is rebuilt from it at each auth-service startup. Keep on
    # uninstall so that upgrades do not invalidate existing gateway sessions.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  clientID: {{ .Values.oidc.clientID | quote }}
  clientSecret: {{ $clientSecret | quote }}
