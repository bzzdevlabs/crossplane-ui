{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crossplane-ui.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: crossplane-ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress allowances are layered on top by component-specific policies.
    []
  egress:
    # Allow DNS out so services can resolve the Kubernetes API and Dex.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to the Kubernetes API.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crossplane-ui.fullname" . }}-gateway-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crossplane-ui.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crossplane-ui.fullname" . }}-auth-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crossplane-ui.selectorLabels" (dict "ctx" . "component" "auth") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "crossplane-ui.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 14 }}
      ports:
        - port: 8081
          protocol: TCP
{{- end }}
