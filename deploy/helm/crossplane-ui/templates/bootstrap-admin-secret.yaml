{{- if .Values.auth.bootstrapAdmin.enabled -}}
{{- $secretName := printf "%s-bootstrap-admin" (include "crossplane-ui.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := .Values.auth.bootstrapAdmin.password -}}
{{- if and (not $password) $existing }}
  {{- $password = index $existing.data "password" | b64dec -}}
{{- end }}
{{- if not $password }}
  {{- $password = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-ui.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  annotations:
    # The auth controller is the authoritative owner of this Secret after
    # bootstrap. Helm only seeds it on first install; subsequent upgrades
    # preserve the existing value (see templates logic above).
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  username: {{ .Values.auth.bootstrapAdmin.username | quote }}
  password: {{ $password | quote }}
{{- end }}
