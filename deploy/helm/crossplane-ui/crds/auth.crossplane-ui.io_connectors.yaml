---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: connectors.auth.crossplane-ui.io
spec:
  group: auth.crossplane-ui.io
  names:
    kind: Connector
    listKind: ConnectorList
    plural: connectors
    shortNames:
    - xpuiconn
    singular: connector
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .spec.disabled
      name: Disabled
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Connector represents a Dex upstream identity provider (LDAP, SAML, GitHub,
          Google, OIDC). The auth controller projects Connectors into Dex's
          `dex.coreos.com/v1` Connector storage after inlining any secret-backed
          fields.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConnectorSpec is the desired state of a Dex connector.
            properties:
              config:
                description: |-
                  Config is the raw Dex connector config. Its schema depends on .type —
                  see docs/authentication.md for per-provider examples. Stored as an
                  opaque JSON object; the controller marshals it unchanged (after secret
                  injection) into Dex's storage.
                x-kubernetes-preserve-unknown-fields: true
              disabled:
                description: Disabled hides the connector from Dex without deleting
                  the CR.
                type: boolean
              id:
                description: |-
                  ID is the stable Dex connector id. It becomes part of the callback
                  path (/callback/{id}) and therefore must be URL-safe and stable across
                  edits (changing it invalidates existing IdP trust).
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              name:
                description: Name is the human-readable label rendered on the Dex
                  login chooser.
                maxLength: 128
                minLength: 1
                type: string
              secretRefs:
                description: |-
                  SecretRefs lists values spliced into .spec.config at project-time so
                  plaintext secrets (client secret, LDAP bind password, certificates)
                  live only in Secrets. The path is a dot-separated JSON path within
                  .spec.config.
                items:
                  description: |-
                    ConnectorSecretInjection declares a value the reconciler must splice into
                    the Dex config at a specific JSON path before writing the Connector
                    storage object. Secrets therefore never appear in the CR itself.
                  properties:
                    path:
                      description: |-
                        Path is a dot-separated JSON path into .spec.config, e.g.
                        "clientSecret" or "bindPW" or "rootCAData".
                      minLength: 1
                      type: string
                    secretRef:
                      description: SecretRef points to the Secret that carries the
                        value.
                      properties:
                        key:
                          description: Key within the Secret's data map.
                          minLength: 1
                          type: string
                        name:
                          description: Name of the Secret.
                          minLength: 1
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - path
                  - secretRef
                  type: object
                type: array
              type:
                description: |-
                  Type is the connector kind. Must match a connector Dex knows how to
                  instantiate.
                enum:
                - ldap
                - saml
                - github
                - google
                - oidc
                type: string
            required:
            - config
            - id
            - name
            - type
            type: object
          status:
            description: ConnectorStatus is the observed state of a Connector.
            properties:
              conditions:
                description: Conditions reports the connector's reconcile state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation the controller last
                  reconciled successfully.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
