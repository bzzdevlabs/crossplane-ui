# Dex storage CRD. Mirrors the CRD Dex's storage/kubernetes package
# creates at startup when storage.type=kubernetes and
# storage.config.inCluster=true. Shipped here so the auth service can
# write Connector objects on first install without racing Dex's own CRD
# creation.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: connectors.dex.coreos.com
  labels:
    app.kubernetes.io/part-of: crossplane-ui
    app.kubernetes.io/managed-by: crossplane-ui
spec:
  group: dex.coreos.com
  scope: Namespaced
  names:
    plural: connectors
    singular: connector
    kind: Connector
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
