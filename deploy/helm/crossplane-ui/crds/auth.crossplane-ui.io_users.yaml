---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: users.auth.crossplane-ui.io
spec:
  group: auth.crossplane-ui.io
  names:
    kind: User
    listKind: UserList
    plural: users
    shortNames:
    - xpuiuser
    singular: user
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.username
      name: Username
      type: string
    - jsonPath: .spec.email
      name: Email
      type: string
    - jsonPath: .spec.disabled
      name: Disabled
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: User represents a local account authenticating through Dex's
          password DB.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UserSpec is the desired state of a local user.
            properties:
              disabled:
                description: |-
                  Disabled hides the user from Dex's staticPasswords list without deleting
                  the object. Useful for temporary lockouts.
                type: boolean
              email:
                description: |-
                  Email is the user's RFC 5322 e-mail address. It is used as the stable
                  identifier passed to Dex (sub claim) and as the login identity in the
                  password DB connector.
                minLength: 3
                pattern: ^[^\s@]+@[^\s@]+\.[^\s@]+$
                type: string
              groups:
                description: |-
                  Groups lists the Group names the user belongs to. Groups are resolved
                  against Group objects by name. Unknown groups are ignored (the
                  controller sets a Degraded condition).
                items:
                  type: string
                type: array
              passwordSecretRef:
                description: |-
                  PasswordSecretRef references a Secret in the auth service's namespace
                  that carries a "password" key (plain text). The auth controller reads
                  the Secret, bcrypts the value and populates Status.PasswordHash, then
                  clears the Secret's password key.

                  If PasswordHash is set directly in the Status by an administrator (for
                  imports from an existing system) PasswordSecretRef may be omitted.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              username:
                description: |-
                  Username is the human-friendly login name surfaced in the UI. It must be
                  unique across all User objects; the controller reports conflicts on the
                  status of the offending objects.
                maxLength: 64
                minLength: 1
                pattern: ^[a-zA-Z0-9._-]+$
                type: string
            required:
            - email
            - username
            type: object
          status:
            description: UserStatus is the observed state of a User.
            properties:
              conditions:
                description: Conditions reports the user's reconcile state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the .metadata.generation the controller last
                  reconciled successfully.
                format: int64
                type: integer
              passwordHash:
                description: |-
                  PasswordHash is the bcrypt hash of the user's password. It is set by the
                  controller after consuming PasswordSecretRef, and is the single source
                  of truth projected into the Dex configuration.
                type: string
              userID:
                description: |-
                  UserID is a stable, randomly generated identifier the controller emits
                  on creation. It is fed to Dex as the userID of the staticPasswords
                  entry and therefore becomes the OIDC sub claim.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
