# Dex storage CRD. Identical schema to the one Dex's
# storage/kubernetes package creates at startup (crdHandling: ensure).
# Shipped here so the auth service can write Password objects on first
# install without racing Dex's own CRD creation.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: passwords.dex.coreos.com
  labels:
    app.kubernetes.io/part-of: crossplane-ui
    app.kubernetes.io/managed-by: crossplane-ui
spec:
  group: dex.coreos.com
  scope: Namespaced
  names:
    plural: passwords
    singular: password
    kind: Password
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
