version: 2

# All ecosystems run monthly with aggressive grouping: one PR per
# directory per ecosystem per month, splitting security updates into a
# separate group so they can be merged independently.

updates:
  - package-ecosystem: gomod
    directory: /pkg
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      gomod-security:
        applies-to: security-updates
        patterns: ["*"]
      gomod:
        applies-to: version-updates
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /services/gateway
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      gomod-security:
        applies-to: security-updates
        patterns: ["*"]
      gomod:
        applies-to: version-updates
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /services/auth
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      gomod-security:
        applies-to: security-updates
        patterns: ["*"]
      gomod:
        applies-to: version-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web/ui
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
      npm:
        applies-to: version-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      github-actions:
        patterns: ["*"]
