# GitHub Actions CI — crossplane-ui
#
# Event gating:
#   - pull_request    → lint + test + build (validation for PRs, incl. dependabot).
#   - push to main    → lint + test + build + release-please. Release Please
#                       either opens a "chore(release)" PR (no artifacts) or,
#                       when that PR has just merged, creates the tag + GitHub
#                       Release and sets release_created=true. In that same
#                       run, package-images, package-chart and scan jobs build
#                       and publish signed artifacts against the new tag.
#
# One workflow run owns the entire release event: no race between release
# creation and asset upload, one SLSA provenance per release. See ADR-0008.
# Dependabot PRs are bounded to validation jobs.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  HELM_VERSION: "3.18.6"
  # golangci-lint official releases still embed Go 1.25, which fails config
  # loading against our Go 1.26 target ("language version used to build
  # golangci-lint is lower than targeted Go version", golangci/golangci-lint#6272).
  # Rebuild from source so the embedded runtime matches.
  GOLANGCI_LINT_VERSION: "v2.11.4"

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint-go:
    name: lint:go (${{ matrix.module.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - { name: gateway, path: services/gateway }
          - { name: auth, path: services/auth }
          - { name: pkg, path: pkg }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            services/gateway/go.sum
            services/auth/go.sum
            pkg/go.sum
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Lint ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.path }}
        run: golangci-lint run ./...

  lint-ui:
    name: lint:ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  lint-helm:
    name: lint:helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - run: helm repo add dex https://charts.dexidp.io
      - run: helm dependency update deploy/helm/crossplane-ui
      - run: helm lint deploy/helm/crossplane-ui

  lint-yaml:
    name: lint:yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ibiqlik/action-yamllint@v3

  lint-commits:
    name: lint:commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test-go:
    name: test:go (${{ matrix.module.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - { name: gateway, path: services/gateway }
          - { name: auth, path: services/auth }
          - { name: pkg, path: pkg }
    env:
      # -race links the race runtime via cgo.
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            services/gateway/go.sum
            services/auth/go.sum
            pkg/go.sum
      - name: Test ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.path }}
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage-${{ matrix.module.name }}
          path: ${{ matrix.module.path }}/coverage.txt
          if-no-files-found: ignore

  test-ui:
    name: test:ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: web/ui/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build-ui:
    needs: [lint-ui, test-ui]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: web/ui/dist/

  build-go:
    name: build:go:${{ matrix.service }}
    needs: [lint-go, test-go]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, auth]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            services/gateway/go.sum
            services/auth/go.sum
            pkg/go.sum
      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go build -trimpath -o ../../bin/${{ matrix.service }} ./cmd
      - uses: actions/upload-artifact@v4
        with:
          name: go-bin-${{ matrix.service }}
          path: bin/${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Release Please (main-push only). Either opens a "chore(release)" PR or,
  # when that PR has just merged, creates the tag + GitHub Release. Downstream
  # package/scan jobs gate on its `release_created` output so a single
  # workflow run owns the whole release event. See ADR-0008.
  # ---------------------------------------------------------------------------
  release-please:
    needs: [lint-helm, lint-yaml, build-go, build-ui]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---------------------------------------------------------------------------
  # Package images (release-gated). Ships gateway + auth to GHCR, signed
  # keyless via Sigstore + SLSA provenance attestations.
  # ---------------------------------------------------------------------------
  package-images:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write        # OIDC token for Sigstore/Fulcio signing
      attestations: write    # write SLSA provenance + SBOM attestations
    env:
      VERSION: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Build & push gateway
        id: push-gateway
        uses: docker/build-push-action@v6
        with:
          # gateway Dockerfile needs the repo root: it embeds the Vue SPA
          # (web/ui/) and shares the Go workspace (pkg/, services/auth/).
          context: .
          file: services/gateway/Dockerfile
          push: true
          # In-toto provenance + SBOM baked into the image manifest. Max mode
          # includes full build materials in the provenance predicate.
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/bzzdevlabs/crossplane-ui/gateway:${{ env.VERSION }}
            ghcr.io/bzzdevlabs/crossplane-ui/gateway:latest
      - name: Sign gateway (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/bzzdevlabs/crossplane-ui/gateway@${{ steps.push-gateway.outputs.digest }}
      - name: Attest gateway provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/bzzdevlabs/crossplane-ui/gateway
          subject-digest: ${{ steps.push-gateway.outputs.digest }}
          push-to-registry: true
      - name: Build & push auth
        id: push-auth
        uses: docker/build-push-action@v6
        with:
          # auth Dockerfile expects the repo root as build context: its
          # go.mod uses `replace ../../pkg`, so pkg/ must be copyable.
          context: .
          file: services/auth/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/bzzdevlabs/crossplane-ui/auth:${{ env.VERSION }}
            ghcr.io/bzzdevlabs/crossplane-ui/auth:latest
      - name: Sign auth (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/bzzdevlabs/crossplane-ui/auth@${{ steps.push-auth.outputs.digest }}
      - name: Attest auth provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/bzzdevlabs/crossplane-ui/auth
          subject-digest: ${{ steps.push-auth.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # Package chart (release-gated). Publishes two channels:
  #   1. OCI on GHCR         — `helm install oci://ghcr.io/...`
  #   2. GitHub Release asset — `.tgz` browsable from the release page
  # Both are cosign-signed + carry SLSA provenance. See ADR-0009.
  # ---------------------------------------------------------------------------
  package-chart:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # gh release upload
      packages: write        # helm push oci
      id-token: write
      attestations: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      VERSION: ${{ needs.release-please.outputs.version }}
      OCI_REF: oci://ghcr.io/bzzdevlabs/crossplane-ui/charts
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - uses: sigstore/cosign-installer@v3
      - name: Login to GHCR (helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package chart
        run: |
          helm repo add dex https://charts.dexidp.io
          helm dependency update deploy/helm/crossplane-ui
          mkdir -p dist
          helm package deploy/helm/crossplane-ui --destination dist
      - name: Push chart to OCI
        id: push-chart
        run: |
          out=$(helm push "dist/crossplane-ui-${VERSION}.tgz" "${OCI_REF}" 2>&1)
          echo "$out"
          digest=$(echo "$out" | awk '/Digest:/ {print $2}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Sign chart (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/bzzdevlabs/crossplane-ui/charts/crossplane-ui@${{ steps.push-chart.outputs.digest }}
      - name: Attest chart provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tgz
      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG}" "dist/crossplane-ui-${VERSION}.tgz" --clobber

  # ---------------------------------------------------------------------------
  # Scan (release-gated). Docker Scout against the just-pushed images. Trivy
  # was dropped because the upstream image itself shipped known-vulnerable libs.
  # ---------------------------------------------------------------------------
  scan-docker-scout:
    needs: [release-please, package-images]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      VERSION: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Docker Scout
        run: curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      - name: Scan gateway
        run: docker scout cves --only-severity critical,high --exit-code ghcr.io/bzzdevlabs/crossplane-ui/gateway:${VERSION}
      - name: Scan auth
        run: docker scout cves --only-severity critical,high --exit-code ghcr.io/bzzdevlabs/crossplane-ui/auth:${VERSION}
