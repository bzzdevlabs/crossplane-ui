# GitHub Actions CI — crossplane-ui
#
# Mirrors the former .gitlab-ci.yml: `lint` and `test` stages only. The
# build / package / scan / release jobs are intentionally disabled (commented
# out at the bottom) until the project is ready to publish images, charts and
# releases. Uncomment each block when needed.
#
# Philosophy carried over from the GitLab pipeline:
#   - CI runs the same `task` commands developers use locally.
#   - Every job is reproducible: pinned tool versions, no floating tags.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"
  HELM_VERSION: "3.18.6"
  # golangci-lint official releases still embed Go 1.25, which fails config
  # loading against our Go 1.26 target ("language version used to build
  # golangci-lint is lower than targeted Go version", golangci/golangci-lint#6272).
  # Rebuild from source so the embedded runtime matches.
  GOLANGCI_LINT_VERSION: "v2.11.4"

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint-go:
    name: lint:go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            services/gateway/go.sum
            services/auth/go.sum
            pkg/go.sum
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Lint gateway
        working-directory: services/gateway
        run: golangci-lint run ./...
      - name: Lint auth
        working-directory: services/auth
        run: golangci-lint run ./...
      - name: Lint pkg
        working-directory: pkg
        run: golangci-lint run ./...

  lint-ui:
    name: lint:ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  lint-helm:
    name: lint:helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - run: helm repo add dex https://charts.dexidp.io
      - run: helm dependency update deploy/helm/crossplane-ui
      - run: helm lint deploy/helm/crossplane-ui

  lint-yaml:
    name: lint:yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ibiqlik/action-yamllint@v3

  lint-commits:
    name: lint:commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test-go:
    name: test:go
    runs-on: ubuntu-latest
    env:
      # -race links the race runtime via cgo.
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            services/gateway/go.sum
            services/auth/go.sum
            pkg/go.sum
      - name: Test gateway
        working-directory: services/gateway
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Test auth
        working-directory: services/auth
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Test pkg
        working-directory: pkg
        run: go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: |
            services/gateway/coverage.txt
            services/auth/coverage.txt
            pkg/coverage.txt
          if-no-files-found: ignore

  test-ui:
    name: test:ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: web/ui/coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Build — DISABLED. Re-enable by uncommenting when artefacts are needed.
  # ---------------------------------------------------------------------------
  build-ui:
    needs: [lint-ui, test-ui]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: web/ui/dist/

  build-go:
    needs: [lint-go, test-go]
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: |
          mkdir -p bin
          (cd services/gateway && go build -trimpath -o ../../bin/gateway ./cmd)
          (cd services/auth    && go build -trimpath -o ../../bin/auth    ./cmd)
      - uses: actions/upload-artifact@v4
        with:
          name: go-bins
          path: bin/

  # ---------------------------------------------------------------------------
  # Package — DISABLED. Re-enable with build-* when images/charts ship to GHCR.
  # ---------------------------------------------------------------------------
  package-images:
    needs: [lint-go, lint-ui, lint-helm, lint-yaml, test-go, test-ui, build-go, build-ui]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write        # OIDC token for Sigstore/Fulcio signing
      attestations: write    # write SLSA provenance + SBOM attestations
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version
        id: ver
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push gateway
        id: push-gateway
        uses: docker/build-push-action@v6
        with:
          context: services/gateway
          file: services/gateway/Dockerfile
          push: true
          # In-toto provenance + SBOM baked into the image manifest. Max mode
          # includes full build materials in the provenance predicate.
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/bzzdevlabs/crossplane-ui/gateway:${{ steps.ver.outputs.version }}
            ghcr.io/bzzdevlabs/crossplane-ui/gateway:latest
      - name: Attest gateway provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/bzzdevlabs/crossplane-ui/gateway
          subject-digest: ${{ steps.push-gateway.outputs.digest }}
          push-to-registry: true
      - name: Build & push auth
        id: push-auth
        uses: docker/build-push-action@v6
        with:
          context: services/auth
          file: services/auth/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/bzzdevlabs/crossplane-ui/auth:${{ steps.ver.outputs.version }}
            ghcr.io/bzzdevlabs/crossplane-ui/auth:latest
      - name: Attest auth provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/bzzdevlabs/crossplane-ui/auth
          subject-digest: ${{ steps.push-auth.outputs.digest }}
          push-to-registry: true

  package-chart:
    needs: [lint-go, lint-ui, lint-helm, lint-yaml, test-go, test-ui, build-go, build-ui]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - run: helm repo add dex https://charts.dexidp.io
      - run: helm dependency update deploy/helm/crossplane-ui
      - run: mkdir -p dist && helm package deploy/helm/crossplane-ui --destination dist
      - name: Attest chart provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz

  # ---------------------------------------------------------------------------
  # Scan — DISABLED. Depends on published images. Uses Docker Scout (Trivy was
  # dropped for known-vulnerable image reasons).
  # ---------------------------------------------------------------------------
  scan-docker-scout:
    needs: [package-images]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Docker Scout
        run: curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
      - name: Scan gateway
        run: docker scout cves --only-severity critical,high --exit-code 1 ghcr.io/bzzdevlabs/crossplane-ui/gateway:${GITHUB_SHA::7}
      - name: Scan auth
        run: docker scout cves --only-severity critical,high --exit-code 1 ghcr.io/bzzdevlabs/crossplane-ui/auth:${GITHUB_SHA::7}

  # ---------------------------------------------------------------------------
  # Release — DISABLED. semantic-release with @semantic-release/github plugin.
  # ---------------------------------------------------------------------------
  release:
    needs: [lint-go, lint-ui, lint-helm, lint-yaml, test-go, test-ui, build-go, build-ui, package-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes \
            -p @semantic-release/github \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/changelog \
            -p @semantic-release/git \
            -p semantic-release \
            semantic-release
