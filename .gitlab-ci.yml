# GitLab CI — crossplane-ui
#
# Philosophy:
#   - CI runs the same `task` commands developers use locally.
#   - Every job is reproducible: pinned images, no `latest` in CI images.
#   - Pipelines short-circuit when only docs change.
#
# Scope note (current phase):
#   The build / package / scan / release stages are intentionally disabled
#   (fully commented out below) so that pushes to `main` only run lint and
#   test. Re-enable them by uncommenting each block when the project is
#   ready to publish images, charts and releases.

stages:
  - lint
  - test
  # Disabled until the project publishes artefacts — see the header note.
  # - build
  # - package
  # - scan
  # - release

variables:
  # Pinned tool images (bumped by Renovate).
  GO_IMAGE: "golang:1.26-alpine"
  NODE_IMAGE: "node:22-alpine"
  HELM_IMAGE: "alpine/helm:3.18.6"
  TASK_IMAGE: "ghcr.io/go-task/task:3.41.0"
  DOCKER_IMAGE: "docker:27.5.1"
  DOCKER_DIND_IMAGE: "docker:27.5.1-dind"
  ALPINE_IMAGE: "alpine:3.20"
  # golangci-lint official images track their own Go runtime. As of April
  # 2026 the latest release (v2.11.4) is still built with Go 1.25, which
  # is lower than our target Go 1.26 and fails config loading with
  # "language version used to build golangci-lint is lower than targeted
  # Go version". Upstream tracking: golangci/golangci-lint#6272. Until
  # that lands we rebuild golangci-lint from source inside $GO_IMAGE so
  # its embedded runtime matches our target.
  GOLANGCI_LINT_VERSION: "v2.11.4"
  # Pipeline-wide.
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  FF_USE_FASTZIP: "true"

# Base cache keys for Go / pnpm / Helm. Jobs extend as needed.
# GitLab CI limits cache.key.files to 2 entries, so we pick the two that
# capture the most cache-invalidating changes: the gateway's go.sum (by
# far the largest dependency set) and go.work (workspace topology and
# toolchain version). When auth/pkg grow direct dependencies we can swap
# one of the two or migrate to a computed key.
.cache-go: &cache-go
  key:
    files:
      - services/gateway/go.sum
      - go.work
  paths:
    - .cache/go-build
    - .cache/go-mod
  policy: pull-push

.cache-pnpm: &cache-pnpm
  key:
    files: [ "web/ui/pnpm-lock.yaml" ]
  paths:
    - web/ui/node_modules
    - .cache/pnpm
  policy: pull-push

.rules-pipeline:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# Lint
# =============================================================================
lint:go:
  stage: lint
  image: $GO_IMAGE
  cache:
    - <<: *cache-go
  rules: !reference [ .rules-pipeline, rules ]
  before_script:
    - apk add --no-cache git bash
    # Build golangci-lint from source so its embedded Go runtime matches
    # our target version. The binary lands in $GOPATH/bin which is on
    # $PATH in the official golang Alpine image.
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
  script:
    - cd services/gateway && golangci-lint run ./...
    - cd ../auth       && golangci-lint run ./...
    - cd ../../pkg     && golangci-lint run ./...

lint:ui:
  stage: lint
  image: $NODE_IMAGE
  cache:
    - <<: *cache-pnpm
  rules: !reference [ .rules-pipeline, rules ]
  before_script:
    - corepack enable
    - cd web/ui
    - pnpm config set store-dir $CI_PROJECT_DIR/.cache/pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run lint
    - pnpm run type-check

lint:helm:
  stage: lint
  # The alpine/helm Dockerfile sets ENTRYPOINT ["helm"], which GitLab
  # breaks by prepending its shell wrapper. Clearing the entrypoint lets
  # GitLab run its own sh and then our script block.
  image:
    name: $HELM_IMAGE
    entrypoint: [""]
  rules: !reference [ .rules-pipeline, rules ]
  before_script:
    - helm repo add dex https://charts.dexidp.io
    - helm dependency update deploy/helm/crossplane-ui
  script:
    - helm lint deploy/helm/crossplane-ui

lint:yaml:
  stage: lint
  # cytopia/yamllint has `ENTRYPOINT ["yamllint"]`, which made GitLab pass
  # its shell wrapper as a yamllint config path. Install yamllint in a
  # plain Alpine image instead — cleaner and avoids a third-party image.
  image: $ALPINE_IMAGE
  rules: !reference [ .rules-pipeline, rules ]
  before_script:
    - apk add --no-cache yamllint
  script:
    - yamllint .

lint:commits:
  stage: lint
  image: $NODE_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - corepack enable
    - npx --yes @commitlint/cli --from $CI_MERGE_REQUEST_DIFF_BASE_SHA --to HEAD

# =============================================================================
# Test
# =============================================================================
test:go:
  stage: test
  image: $GO_IMAGE
  cache:
    - <<: *cache-go
  rules: !reference [ .rules-pipeline, rules ]
  variables:
    # -race uses Go's race detector, whose runtime is linked via cgo and
    # therefore needs a working C toolchain. golang:1.26-alpine ships
    # without gcc, so we pull the two smallest packages that satisfy it.
    CGO_ENABLED: "1"
  before_script:
    - apk add --no-cache gcc musl-dev git make
  script:
    - |
      for mod in services/gateway services/auth pkg; do
        echo "→ $mod"
        (cd $mod && go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...)
      done
  artifacts:
    paths:
      - services/*/coverage.txt
      - pkg/coverage.txt
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/gateway/coverage.txt

test:ui:
  stage: test
  image: $NODE_IMAGE
  cache:
    - <<: *cache-pnpm
  rules: !reference [ .rules-pipeline, rules ]
  before_script:
    - corepack enable
    - cd web/ui
    - pnpm config set store-dir $CI_PROJECT_DIR/.cache/pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run test:coverage
  coverage: /All files\s*\|\s*([0-9.]+)/
  artifacts:
    paths:
      - web/ui/coverage/

