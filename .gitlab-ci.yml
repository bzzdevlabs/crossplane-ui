# GitLab CI — crossplane-ui
#
# Philosophy:
#   - CI runs the same `task` commands developers use locally.
#   - Every job is reproducible: pinned images, no `latest` in CI images.
#   - Pipelines short-circuit when only docs change.

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml

stages:
  - lint
  - test
  - build
  - package
  - scan
  - release

variables:
  # Pinned tool images (bumped by Renovate).
  GO_IMAGE: "golang:1.26-alpine"
  NODE_IMAGE: "node:22-alpine"
  HELM_IMAGE: "alpine/helm:3.16.4"
  TASK_IMAGE: "ghcr.io/go-task/task:3.41.0"
  DOCKER_IMAGE: "docker:27.5.1"
  DOCKER_DIND_IMAGE: "docker:27.5.1-dind"
  # Pipeline-wide.
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  FF_USE_FASTZIP: "true"

# Base cache keys for Go / pnpm / Helm. Jobs extend as needed.
.cache-go: &cache-go
  key:
    files:
      - services/gateway/go.sum
      - services/auth/go.sum
      - pkg/go.sum
  paths:
    - .cache/go-build
    - .cache/go-mod
  policy: pull-push

.cache-pnpm: &cache-pnpm
  key:
    files: ["web/ui/pnpm-lock.yaml"]
  paths:
    - web/ui/node_modules
    - .cache/pnpm
  policy: pull-push

.rules-pipeline:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# Lint
# =============================================================================
lint:go:
  stage: lint
  image: "golangci/golangci-lint:v2.3.0"
  cache:
    - <<: *cache-go
  rules: !reference [.rules-pipeline, rules]
  script:
    - cd services/gateway && golangci-lint run ./...
    - cd ../auth       && golangci-lint run ./...
    - cd ../../pkg     && golangci-lint run ./...

lint:ui:
  stage: lint
  image: $NODE_IMAGE
  cache:
    - <<: *cache-pnpm
  rules: !reference [.rules-pipeline, rules]
  before_script:
    - corepack enable
    - cd web/ui
    - pnpm config set store-dir $CI_PROJECT_DIR/.cache/pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run lint
    - pnpm run type-check

lint:helm:
  stage: lint
  image: $HELM_IMAGE
  rules: !reference [.rules-pipeline, rules]
  before_script:
    - helm repo add dex https://charts.dexidp.io
    - helm dependency update deploy/helm/crossplane-ui
  script:
    - helm lint deploy/helm/crossplane-ui

lint:yaml:
  stage: lint
  image: "cytopia/yamllint:1"
  rules: !reference [.rules-pipeline, rules]
  script:
    - yamllint .

lint:commits:
  stage: lint
  image: $NODE_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - corepack enable
    - npx --yes @commitlint/cli --from $CI_MERGE_REQUEST_DIFF_BASE_SHA --to HEAD

# =============================================================================
# Test
# =============================================================================
test:go:
  stage: test
  image: $GO_IMAGE
  cache:
    - <<: *cache-go
  rules: !reference [.rules-pipeline, rules]
  script:
    - apk add --no-cache make git
    - |
      for mod in services/gateway services/auth pkg; do
        echo "→ $mod"
        (cd $mod && go test -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...)
      done
  artifacts:
    paths:
      - services/*/coverage.txt
      - pkg/coverage.txt
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/gateway/coverage.txt

test:ui:
  stage: test
  image: $NODE_IMAGE
  cache:
    - <<: *cache-pnpm
  rules: !reference [.rules-pipeline, rules]
  before_script:
    - corepack enable
    - cd web/ui
    - pnpm config set store-dir $CI_PROJECT_DIR/.cache/pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run test:coverage
  coverage: /All files\s*\|\s*([0-9.]+)/
  artifacts:
    paths:
      - web/ui/coverage/

# =============================================================================
# Build
# =============================================================================
build:ui:
  stage: build
  image: $NODE_IMAGE
  cache:
    - <<: *cache-pnpm
  rules: !reference [.rules-pipeline, rules]
  before_script:
    - corepack enable
    - cd web/ui
    - pnpm config set store-dir $CI_PROJECT_DIR/.cache/pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
  artifacts:
    paths:
      - web/ui/dist/
    expire_in: 1 week

build:go:
  stage: build
  image: $GO_IMAGE
  cache:
    - <<: *cache-go
  rules: !reference [.rules-pipeline, rules]
  script:
    - mkdir -p bin
    - cd services/gateway && CGO_ENABLED=0 go build -trimpath -o ../../bin/gateway ./cmd
    - cd ../auth       && CGO_ENABLED=0 go build -trimpath -o ../../bin/auth ./cmd
  artifacts:
    paths:
      - bin/
    expire_in: 1 week

# =============================================================================
# Package
# =============================================================================
package:images:
  stage: package
  image: $DOCKER_IMAGE
  services:
    - $DOCKER_DIND_IMAGE
  needs: [build:ui, build:go]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - export VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
    - docker build
        --build-arg VERSION=$VERSION
        --build-arg COMMIT=$CI_COMMIT_SHORT_SHA
        --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        -t $CI_REGISTRY_IMAGE/gateway:$VERSION
        -t $CI_REGISTRY_IMAGE/gateway:latest
        -f services/gateway/Dockerfile services/gateway
    - docker push $CI_REGISTRY_IMAGE/gateway:$VERSION
    - docker push $CI_REGISTRY_IMAGE/gateway:latest
    - docker build
        --build-arg VERSION=$VERSION
        --build-arg COMMIT=$CI_COMMIT_SHORT_SHA
        --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        -t $CI_REGISTRY_IMAGE/auth:$VERSION
        -t $CI_REGISTRY_IMAGE/auth:latest
        -f services/auth/Dockerfile services/auth
    - docker push $CI_REGISTRY_IMAGE/auth:$VERSION
    - docker push $CI_REGISTRY_IMAGE/auth:latest

package:chart:
  stage: package
  image: $HELM_IMAGE
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - helm repo add dex https://charts.dexidp.io
    - helm dependency update deploy/helm/crossplane-ui
  script:
    - mkdir -p dist
    - helm package deploy/helm/crossplane-ui --destination dist
  artifacts:
    paths:
      - dist/*.tgz

# =============================================================================
# Scan — images are expected to be built before these jobs run.
# =============================================================================
scan:trivy:
  stage: scan
  image: "aquasec/trivy:0.57.1"
  needs: [package:images]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress $CI_REGISTRY_IMAGE/gateway:$VERSION
    - trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress $CI_REGISTRY_IMAGE/auth:$VERSION
  allow_failure: true

# =============================================================================
# Release — semantic-release on tagged pipelines + main.
# =============================================================================
release:
  stage: release
  image: $NODE_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  script:
    - corepack enable
    - npx --yes -p @semantic-release/gitlab -p @semantic-release/commit-analyzer -p @semantic-release/release-notes-generator -p @semantic-release/changelog -p @semantic-release/git -p semantic-release semantic-release
